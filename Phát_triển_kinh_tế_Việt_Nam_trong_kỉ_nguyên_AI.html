<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AIDEOM-VN · Analytics Terminal</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/KaTeX/0.16.9/katex.min.css">
<script defer src="https://cdnjs.cloudflare.com/ajax/libs/KaTeX/0.16.9/katex.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
<style>

:root{
  --bg:#0A0D14; --bg2:#070A10; --grid:rgba(45,212,191,.05);
  --panel:#0F141E; --panel-2:#131926; --ink:#E8EDF4; --soft:#94A3B8; --dim:#64748B;
  --line:#1E2735; --line-2:#172030;
  --acc:#2DD4BF; --acc-2:#22D3EE; --mag:#FB7185; --amber:#FBBF24; --lime:#4ADE80; --blue:#60A5FA; --violet:#C084FC;
  --glow:0 0 0 1px rgba(45,212,191,.15), 0 0 24px -6px rgba(45,212,191,.25);
  --shadow:0 18px 50px -28px rgba(0,0,0,.8);
  --sb-w:264px;
}
[data-theme="light"]{
  --bg:#EEF1F5; --bg2:#E4E8EE; --grid:rgba(15,118,110,.05);
  --panel:#FFFFFF; --panel-2:#F6F8FB; --ink:#0B1220; --soft:#475569; --dim:#94A3B8;
  --line:#DCE3EC; --line-2:#E6ECF3; --acc:#0D9488; --acc-2:#0891B2;
  --glow:0 0 0 1px rgba(13,148,136,.18),0 8px 24px -12px rgba(13,148,136,.3);
  --shadow:0 14px 40px -22px rgba(20,40,60,.4);
}
*{box-sizing:border-box;}
html{scroll-behavior:smooth;}
body{margin:0;color:var(--ink);font-family:"Inter",system-ui,sans-serif;font-size:15px;line-height:1.6;-webkit-font-smoothing:antialiased;
  background-color:var(--bg);
  background-image:linear-gradient(var(--grid) 1px,transparent 1px),linear-gradient(90deg,var(--grid) 1px,transparent 1px),radial-gradient(700px 380px at 100% -5%, rgba(34,211,238,.10), transparent 60%),radial-gradient(600px 360px at 0% 0%, rgba(192,132,252,.07), transparent 60%);
  background-size:46px 46px,46px 46px,100% 100%,100% 100%;background-attachment:fixed;transition:background-color .4s,color .25s;}
a{color:inherit;text-decoration:none;}
::selection{background:var(--acc);color:#06231f;}
::-webkit-scrollbar{width:10px;height:10px;}::-webkit-scrollbar-track{background:transparent;}
::-webkit-scrollbar-thumb{background:var(--line);}::-webkit-scrollbar-thumb:hover{background:var(--acc);}

/* HEADER */
.hbar{position:sticky;top:0;z-index:60;background:color-mix(in srgb,var(--bg) 86%,transparent);backdrop-filter:blur(14px);border-bottom:1px solid var(--line);}
.hbar-in{display:flex;align-items:center;gap:16px;padding:0 24px;height:60px;}
.brand{font-family:"Space Grotesk",sans-serif;font-weight:700;font-size:19px;letter-spacing:.02em;display:flex;align-items:center;gap:9px;}
.brand .sq{width:22px;height:22px;border-radius:6px;background:linear-gradient(135deg,var(--acc),var(--acc-2));box-shadow:var(--glow);display:grid;place-items:center;color:#06231f;font-size:12px;font-weight:900;}
.brand b{color:var(--acc);}
.status{font-family:"JetBrains Mono",monospace;font-size:11px;color:var(--soft);display:flex;align-items:center;gap:7px;}
.status .dot{width:7px;height:7px;border-radius:50%;background:var(--lime);box-shadow:0 0 8px var(--lime);animation:pulse 2s infinite;}
@keyframes pulse{0%,100%{opacity:1;}50%{opacity:.35;}}
.hbar .sp{flex:1;}
.theme-btn{background:var(--panel);border:1px solid var(--line);color:var(--soft);width:38px;height:38px;border-radius:9px;cursor:pointer;font-size:15px;transition:.2s;}
.theme-btn:hover{color:var(--acc);border-color:var(--acc);box-shadow:var(--glow);}
.menu-btn{display:none;background:var(--panel);border:1px solid var(--line);color:var(--soft);width:38px;height:38px;border-radius:9px;cursor:pointer;font-size:17px;}

/* LAYOUT: left sidebar */
.shell{display:flex;min-height:calc(100vh - 60px);}
#sidebar{width:var(--sb-w);flex:0 0 var(--sb-w);background:var(--panel);border-right:1px solid var(--line);position:sticky;top:60px;height:calc(100vh - 60px);overflow-y:auto;padding:16px 12px;display:flex;flex-direction:column;}
.sb-title{font-family:"JetBrains Mono",monospace;font-size:10.5px;letter-spacing:.16em;text-transform:uppercase;color:var(--dim);padding:6px 12px 12px;}
.nav-item{display:flex;align-items:center;gap:12px;width:100%;padding:10px 13px;border:1px solid transparent;background:none;border-radius:9px;cursor:pointer;color:var(--soft);font-family:"Inter",sans-serif;font-size:13.5px;font-weight:500;transition:.16s;text-align:left;margin-bottom:2px;}
.nav-item:hover{color:var(--ink);background:var(--panel-2);}
.nav-item.active{color:#06231f;background:linear-gradient(135deg,var(--acc),var(--acc-2));font-weight:700;box-shadow:var(--glow);}
.nav-item .no{font-family:"JetBrains Mono",monospace;font-size:11px;opacity:.7;width:22px;flex:0 0 22px;}
.nav-item.active .no{opacity:.85;}
.nav-item .nm{flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.sb-info{margin-top:auto;padding:14px 13px;background:var(--panel-2);border:1px solid var(--line);border-radius:10px;font-family:"JetBrains Mono",monospace;font-size:11px;line-height:1.7;color:var(--soft);}
.sb-info .row{display:flex;flex-direction:column;gap:1px;margin-bottom:7px;}
.sb-info .row:last-child{margin-bottom:0;}
.sb-info .k{color:var(--dim);font-size:10px;text-transform:uppercase;letter-spacing:.05em;}
.sb-info .vv{color:var(--acc);font-weight:600;}

.main{flex:1;min-width:0;max-width:1040px;padding:34px 42px 90px;}
@media(max-width:900px){
  .menu-btn{display:block;}
  #sidebar{position:fixed;left:calc(-1 * var(--sb-w) - 8px);top:60px;z-index:50;transition:.28s cubic-bezier(.4,0,.2,1);box-shadow:var(--shadow);}
  #sidebar.open{left:0;}
  .main{padding:24px 16px 70px;}
  .status{display:none;}
}

.page{display:none;}
.page.active{display:block;animation:in .4s cubic-bezier(.2,.7,.2,1);}
@keyframes in{from{opacity:0;transform:translateY(12px);}to{opacity:1;transform:none;}}

.crumb{font-family:"JetBrains Mono",monospace;font-size:11px;letter-spacing:.14em;text-transform:uppercase;color:var(--acc);display:inline-flex;align-items:center;gap:8px;}
.crumb::before{content:"//";opacity:.5;}
.page h1{font-family:"Space Grotesk",sans-serif;font-weight:700;font-size:clamp(27px,4.2vw,40px);line-height:1.08;margin:12px 0 8px;letter-spacing:-.015em;}
.page .sub{font-size:16px;color:var(--soft);max-width:66ch;margin:0 0 8px;}
.objective{background:var(--panel-2);border:1px solid var(--line);border-left:3px solid var(--acc);border-radius:0 10px 10px 0;padding:15px 19px;margin:20px 0;font-size:14.5px;}
.objective b{color:var(--acc);}

.sec-h{display:flex;align-items:center;gap:13px;margin:42px 0 6px;padding-bottom:11px;border-bottom:1px solid var(--line);}
.sec-h .ico{width:36px;height:36px;border-radius:9px;display:grid;place-items:center;font-size:16px;color:#06231f;flex:0 0 36px;font-weight:700;}
.sec-h h2{font-family:"Space Grotesk",sans-serif;font-weight:700;font-size:21px;margin:0;letter-spacing:-.01em;}
.sec-h .d{font-family:"JetBrains Mono",monospace;font-size:11.5px;color:var(--dim);margin-top:3px;}

.panel{background:var(--panel);border:1px solid var(--line);border-radius:12px;padding:20px 22px;margin-top:18px;box-shadow:var(--shadow);}
.formula{background:var(--bg2);border:1px solid var(--line);border-radius:9px;padding:14px 18px;margin:16px 0;overflow-x:auto;}
.note{font-size:13.6px;color:var(--soft);background:var(--panel-2);border:1px solid var(--line);border-radius:10px;padding:13px 16px 13px 24px;margin-top:16px;position:relative;}
.note::before{content:"›";position:absolute;left:6px;top:11px;color:var(--amber);font-weight:900;}
.note b{color:var(--ink);}

.stats{display:grid;grid-template-columns:repeat(4,1fr);gap:13px;margin-top:20px;}
.stat{background:var(--panel);border:1px solid var(--line);border-radius:11px;padding:16px 17px;position:relative;overflow:hidden;transition:.2s;}
.stat:hover{border-color:var(--c,var(--acc));box-shadow:0 0 0 1px var(--c,var(--acc)),0 0 22px -8px var(--c,var(--acc));}
.stat::before{content:"";position:absolute;top:0;left:0;width:34px;height:3px;background:var(--c,var(--acc));}
.stat .l{font-family:"JetBrains Mono",monospace;font-size:10.5px;letter-spacing:.08em;text-transform:uppercase;color:var(--dim);}
.stat .v{font-family:"Space Grotesk",sans-serif;font-weight:700;font-size:27px;line-height:1.12;margin-top:7px;color:var(--ink);}
.stat .s{font-size:12px;color:var(--soft);margin-top:3px;}

.scards{display:grid;grid-template-columns:repeat(auto-fit,minmax(186px,1fr));gap:13px;margin-top:18px;}
.scard{background:var(--panel);border:1px solid var(--line);border-radius:12px;padding:17px;transition:.2s;position:relative;}
.scard::after{content:"";position:absolute;top:11px;right:11px;width:5px;height:5px;border-radius:50%;background:var(--acc);box-shadow:0 0 8px var(--acc);}
.scard:hover{border-color:var(--acc);transform:translateY(-3px);box-shadow:var(--glow);}
.scard .top{display:flex;align-items:center;justify-content:space-between;margin-bottom:11px;}
.scard .emoji{font-size:24px;}
.scard .badge{font-family:"JetBrains Mono",monospace;font-size:10px;font-weight:600;letter-spacing:.05em;color:var(--acc);background:rgba(45,212,191,.1);padding:4px 9px;border-radius:6px;text-transform:uppercase;border:1px solid rgba(45,212,191,.25);}
.scard h4{font-size:15px;font-weight:700;margin:0 0 6px;font-family:"Space Grotesk",sans-serif;}
.scard .desc{font-size:12.5px;color:var(--soft);line-height:1.5;min-height:50px;}
.scard .pol-l{font-family:"JetBrains Mono",monospace;font-size:10.5px;color:var(--dim);text-transform:uppercase;letter-spacing:.06em;margin:13px 0 6px;}
.scard .pill{display:inline-block;font-size:12px;font-weight:700;color:#06231f;padding:6px 13px;border-radius:7px;background:linear-gradient(135deg,var(--acc),var(--acc-2));}
.scard .q{font-family:"JetBrains Mono",monospace;font-size:18px;font-weight:600;margin-top:12px;}
.scard .q b{color:var(--acc);}

.tbl{overflow-x:auto;margin-top:16px;border:1px solid var(--line);border-radius:11px;}
table{border-collapse:collapse;width:100%;font-size:13.4px;background:var(--panel);}
th,td{padding:10px 14px;text-align:right;border-bottom:1px solid var(--line-2);white-space:nowrap;}
th:first-child,td:first-child{text-align:left;}
thead th{background:var(--panel-2);color:var(--acc);font-family:"JetBrains Mono",monospace;font-weight:600;font-size:11.5px;letter-spacing:.04em;text-transform:uppercase;position:sticky;top:0;border-bottom:1px solid var(--acc);}
tbody tr{transition:.1s;}tbody tr:hover{background:var(--panel-2);}
tfoot td{font-weight:700;background:var(--panel-2);border-top:1px solid var(--acc);color:var(--acc);}
.mono{font-family:"JetBrains Mono",monospace;}.win{color:var(--lime);font-weight:600;}.bad{color:var(--mag);font-weight:600;}

.chart-card{background:var(--panel);border:1px solid var(--line);border-radius:12px;padding:0;margin-top:16px;box-shadow:var(--shadow);overflow:hidden;}
.chart-card h4{font-family:"Space Grotesk",sans-serif;font-weight:700;font-size:15.5px;margin:0;padding:15px 20px 4px;}
.chart-card .cap{font-size:12.2px;color:var(--soft);margin:0;padding:0 20px 14px;border-bottom:1px solid var(--line-2);}
.cbox{position:relative;height:330px;padding:16px 20px;}.cbox.sm{height:288px;}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:14px;}
@media(max-width:760px){.grid2{grid-template-columns:1fr;}.stats{grid-template-columns:1fr 1fr;}}

.ctrls{display:flex;flex-direction:column;gap:14px;}
.ctrl label{display:flex;justify-content:space-between;font-size:13.5px;font-weight:600;margin-bottom:6px;}
.ctrl label .v{font-family:"JetBrains Mono",monospace;color:var(--acc);}
input[type=range]{-webkit-appearance:none;appearance:none;width:100%;height:5px;background:var(--line);outline:none;cursor:pointer;}
input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:16px;height:16px;border-radius:3px;background:var(--acc);border:none;box-shadow:0 0 10px var(--acc);cursor:pointer;}
input[type=range]::-moz-range-thumb{width:14px;height:14px;border-radius:3px;background:var(--acc);border:none;cursor:pointer;}
.ctrl .h{font-size:11.5px;color:var(--dim);margin-top:4px;}
.bigres{background:linear-gradient(150deg,var(--panel-2),var(--panel));border:1px solid var(--acc);border-radius:12px;padding:24px;display:flex;flex-direction:column;justify-content:center;box-shadow:var(--glow);position:relative;overflow:hidden;}
.bigres::before{content:"";position:absolute;inset:0;background:radial-gradient(300px 160px at 90% 10%,rgba(45,212,191,.12),transparent 60%);}
.bigres>*{position:relative;z-index:1;}
.bigres .l{font-family:"JetBrains Mono",monospace;font-size:11px;letter-spacing:.14em;text-transform:uppercase;color:var(--acc);}
.bigres .n{font-family:"Space Grotesk",sans-serif;font-weight:700;font-size:clamp(34px,5vw,48px);line-height:1;margin:9px 0;color:var(--ink);}
.bigres .n small{font-size:.36em;color:var(--soft);font-weight:500;}
.bigres .rows{margin-top:13px;border-top:1px solid var(--line);padding-top:13px;font-size:13px;}
.bigres .rows div{display:flex;justify-content:space-between;padding:3px 0;}
.bigres .rows b{font-family:"JetBrains Mono",monospace;color:var(--acc);}
.rbtn{margin-top:13px;align-self:start;background:var(--bg2);border:1px solid var(--line);color:var(--soft);font-family:"JetBrains Mono",monospace;font-size:11px;padding:7px 14px;border-radius:7px;cursor:pointer;transition:.18s;}
.rbtn:hover{color:var(--acc);border-color:var(--acc);}

.qa{background:var(--panel);border:1px solid var(--line);border-left:3px solid var(--amber);border-radius:0 10px 10px 0;padding:14px 18px;margin-top:13px;}
.qa .q{font-family:"Space Grotesk",sans-serif;font-weight:700;font-size:15.5px;}
.qa .a{color:var(--soft);font-size:14px;margin-top:4px;}
.pill-i{display:inline-block;background:rgba(45,212,191,.1);border:1px solid rgba(45,212,191,.25);border-radius:6px;padding:2px 9px;font-size:12px;font-family:"JetBrains Mono",monospace;color:var(--acc);}

.tabs{display:flex;gap:0;margin-top:20px;border:1px solid var(--line);border-radius:10px;overflow:hidden;flex-wrap:wrap;}
.tab{flex:1;min-width:120px;padding:11px 16px;font-size:13.5px;font-weight:600;color:var(--soft);cursor:pointer;border:none;background:var(--panel);border-right:1px solid var(--line);transition:.16s;font-family:"Space Grotesk",sans-serif;}
.tab:last-child{border-right:none;}.tab:hover{color:var(--ink);background:var(--panel-2);}
.tab.active{color:#06231f;background:linear-gradient(135deg,var(--acc),var(--acc-2));}
.tabpane{display:none;}.tabpane.active{display:block;animation:in .3s;}

/* ===== HOMEPAGE (terminal) ===== */
.term-banner{background:var(--panel);border:1px solid var(--line);border-radius:14px;overflow:hidden;box-shadow:var(--shadow);}
.tb-bar{display:flex;align-items:center;gap:8px;padding:11px 16px;background:var(--bg2);border-bottom:1px solid var(--line);}
.tb-dot{width:11px;height:11px;border-radius:50%;}
.tb-dot.r{background:#FB7185;}.tb-dot.y{background:#FBBF24;}.tb-dot.g{background:#4ADE80;}
.tb-path{font-family:"JetBrains Mono",monospace;font-size:11.5px;color:var(--dim);margin-left:8px;}
.tb-body{padding:26px 30px 30px;position:relative;}
.tb-body::after{content:"";position:absolute;right:-70px;top:-70px;width:280px;height:280px;border-radius:50%;background:radial-gradient(circle,rgba(45,212,191,.14),transparent 70%);}
.tb-body>*{position:relative;z-index:1;}
.tb-line{font-family:"JetBrains Mono",monospace;font-size:13.5px;}
.tb-line .prompt{color:var(--acc);}.tb-line .cmd{color:var(--violet);}
.tb-out{font-family:"JetBrains Mono",monospace;font-size:12.5px;color:var(--lime);margin:6px 0 4px;}
.tb-body h1{font-family:"Space Grotesk",sans-serif;font-weight:700;font-size:clamp(28px,5vw,46px);line-height:1.05;margin:16px 0 10px;letter-spacing:-.02em;}
.tb-body h1 em{font-style:normal;color:var(--acc);}
.tb-body p{font-size:16px;color:var(--soft);max-width:62ch;margin:0;}
.chips{display:flex;flex-wrap:wrap;gap:9px;margin-top:20px;}
.chip{background:var(--bg2);border:1px solid var(--line);border-radius:8px;padding:6px 14px;font-size:12px;color:var(--soft);font-family:"JetBrains Mono",monospace;}
.lvl-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:13px;margin-top:18px;}
.lvl{background:var(--panel);border:1px solid var(--line);border-radius:11px;padding:16px;border-top:3px solid var(--c,var(--acc));transition:.2s;}
.lvl:hover{transform:translateY(-3px);border-color:var(--c,var(--acc));box-shadow:0 0 22px -10px var(--c,var(--acc));}
.lvl .t{font-family:"Space Grotesk",sans-serif;font-weight:700;font-size:14px;letter-spacing:.03em;text-transform:uppercase;color:var(--c);}
.lvl .n{font-size:13px;color:var(--soft);margin-top:5px;}
.lvl .b{font-family:"JetBrains Mono",monospace;font-size:11px;color:var(--dim);margin-top:9px;}
.bgrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(232px,1fr));gap:11px;margin-top:16px;}
.bcard{background:var(--panel);border:1px solid var(--line);border-radius:10px;padding:14px 16px;cursor:pointer;transition:.18s;display:flex;gap:13px;align-items:center;}
.bcard:hover{border-color:var(--acc);transform:translateX(3px);box-shadow:var(--glow);}
.bcard:hover .arr{color:var(--acc);transform:translateX(3px);}
.bcard .dirno{font-family:"JetBrains Mono",monospace;font-size:14px;color:var(--acc);font-weight:600;flex:0 0 auto;}
.bcard h4{font-size:14px;font-weight:600;margin:0 0 2px;line-height:1.2;font-family:"Space Grotesk",sans-serif;}
.bcard .sk{font-size:11.5px;color:var(--dim);font-family:"JetBrains Mono",monospace;}
.bcard>div{flex:1;min-width:0;}
.bcard .arr{color:var(--dim);font-size:16px;transition:.18s;flex:0 0 auto;}
.rubric{display:none;}
.summary-lead{display:none;}
@media(max-width:760px){.lvl-grid{grid-template-columns:1fr 1fr;}.tb-body{padding:24px 20px;}}

.footnote{margin-top:44px;border-top:1px solid var(--line);padding-top:18px;font-size:12.5px;color:var(--dim);}
.footnote code{background:var(--bg2);padding:2px 6px;border-radius:5px;font-family:"JetBrains Mono",monospace;font-size:11.5px;color:var(--acc);}

/* ===== MATH MODEL BLOCK ===== */
.model{background:linear-gradient(160deg,var(--panel-2),var(--panel));border:1px solid var(--line);border-left:3px solid var(--acc-2);border-radius:0 12px 12px 0;padding:18px 22px;margin:18px 0;}
.model .mlabel{font-family:"JetBrains Mono",monospace;font-size:10.5px;letter-spacing:.14em;text-transform:uppercase;color:var(--acc-2);margin-bottom:10px;display:flex;align-items:center;gap:8px;}
.model .mlabel::before{content:"∑";font-size:15px;}
.model .eq{background:var(--bg2);border:1px solid var(--line);border-radius:8px;padding:12px 16px;margin:10px 0;overflow-x:auto;}
.model .vars{font-size:13px;color:var(--soft);margin-top:10px;line-height:1.85;}
.model .vars code{background:var(--bg2);padding:1px 7px;border-radius:5px;font-family:"JetBrains Mono",monospace;font-size:12px;color:var(--acc);}
.constraints{list-style:none;padding:0;margin:12px 0 0;counter-reset:c;}
.constraints li{position:relative;padding:9px 14px 9px 46px;border:1px solid var(--line);border-radius:8px;margin-bottom:8px;background:var(--bg2);font-size:13.5px;}
.constraints li::before{counter-increment:c;content:"C"counter(c);position:absolute;left:11px;top:9px;font-family:"JetBrains Mono",monospace;font-size:11px;font-weight:700;color:#06231f;background:var(--acc-2);padding:2px 6px;border-radius:5px;}
.constraints li .cx{font-family:"JetBrains Mono",monospace;color:var(--acc);font-size:12.5px;}
.constraints li .cn{color:var(--dim);font-size:12px;margin-left:6px;}

/* ===== CODE BLOCK (collapsible) ===== */
.codewrap{margin:16px 0;border:1px solid var(--line);border-radius:11px;overflow:hidden;background:var(--bg2);}
.codehead{display:flex;align-items:center;gap:10px;padding:11px 16px;background:var(--panel-2);border-bottom:1px solid var(--line);cursor:pointer;user-select:none;transition:.15s;}
.codehead:hover{background:var(--panel);}
.codehead .py{font-family:"JetBrains Mono",monospace;font-size:11px;font-weight:600;letter-spacing:.06em;color:var(--lime);text-transform:uppercase;display:flex;align-items:center;gap:7px;}
.codehead .py::before{content:"";width:8px;height:8px;border-radius:2px;background:var(--lime);box-shadow:0 0 7px var(--lime);}

nD0={'NMM':38,'RRD':78,'NCC':55,'CH':32,'SE':82,'MD':48}; gam=0.002\n\ndef solve(equity=True, lam=0.65):\n    m=pulp.LpProblem('digital_budget', pulp.LpMaximize)\n    x=pulp.LpVariable.dicts('x',(regions,items),lowBound=0)\n    m += pulp.lpSum(beta[r,j]*x[r][j] for r in regions for j in items)\n    m += pulp.lpSum(x[r][j] for r in regions for j in items) <= 50000   # C1\n    for r in regions:\n        m += pulp.lpSum(x[r][j] for j in items) >= 5000                 # C2 sàn\n        m += pulp.lpSum(x[r][j] for j in items) <= 12000                # C3 trần\n    m += pulp.lpSum(x[r]['H'] for r in regions) >= 12000                # C4\n    if equity:                                                          # C5 công bằng\n        M=pulp.LpVariable('Dmax', lowBound=0)\n        for r in regions: m += D0[r]+gam*x[r]['D'] <= M\n        for r in regions: m += D0[r]+gam*x[r]['D'] >= lam*M\n    m.solve(pulp.PULP_CBC_CMD(msg=False))\n    return pulp.LpStatus[m.status], pulp.value(m.objective)\n\n# λ=0.70 (đề bài) -> INFEASIBLE vì Tây Nguyên (D0=32) tối đa chỉ đạt 56 < 0.7*82=57.4\nprint(solve(lam=0.70))        # ('Infeasible', None)\nprint(solve(lam=0.65))        # ('Optimal', 57212)  -> λ khả thi\nprint('Chi phí công bằng =', solve(equity=False)[1] - solve(lam=0.65)[1])  # ~11538", "bai5": "from pulp import *\nP=range(1,16)\nC ={1:12000,2:11500,3:18000,4:4500,5:3200,6:5800,7:6500,8:15000,\n    9:2500,10:7200,11:4800,12:8500,13:20000,14:3800,15:1500}      # chi phí\nC12={1:8500,2:7500,3:12000,4:3500,5:2500,6:4000,7:4500,8:9000,\n    9:1800,10:5000,11:3500,12:5500,13:13000,14:2800,15:1200}      # năm 1-2\nB ={1:21500,2:20800,3:32500,4:9200,5:6800,6:11400,7:12200,8:28500,\n    9:5800,10:13800,11:8500,12:16200,13:35000,14:7500,15:3800}    # lợi ích NPV\n\nm=LpProblem('project_selection', LpMaximize)\ny=LpVariable.dicts('y', P, cat='Binary')\nm += lpSum(B[i]*y[i] for i in P)\nm += lpSum(C[i]*y[i]   for i in P) <= 80000     # C1 ngân sách 5 năm\nm += lpSum(C12[i]*y[i] for i in P) <= 40000     # C2 ngân sách năm 1-2\nm += y[1]+y[2] <= 1                             # C3 loại trừ TT dữ liệu\nm += y[8]  <= y[12]; m += y[13] <= y[12]        # C4,C5 tiên quyết đào tạo\nm += y[4]+y[5] >= 1; m += y[14] >= 1            # C6 chính phủ số & an ninh\nm += lpSum(y[i] for i in P) >= 7\nm += lpSum(y[i] for i in P) <= 11               # C7 số lượng dự án\nm.solve(PULP_CBC_CMD(msg=False))\nsel=[i for i in P if y[i].value()>0.5]\nprint('Chọn:', sel, ' NPV =', value(m.objective))   # Z*=115400", "bai6": "import numpy as np, pandas as pd\ndf = pd.read_csv('vietnam_regions_2024.csv')\ncrit=['grdp_pc','fdi','digital','ai_ready','trained','rd','internet','gini']\nbenefit=np.array([1,1,1,1,1,1,1,0], bool)   # gini là tiêu chí chi phí\nX=df[crit].values.astype(float)\n\ndef topsis(X, w):\n    R = X / np.sqrt((X**2).sum(0))           # chuẩn hóa vector\n    V = R * w                                # ma trận có trọng số\n    Ap = np.where(benefit, V.max(0), V.min(0))   # lý tưởng dương A*\n    An = np.where(benefit, V.min(0), V.max(0))   # lý tưởng âm  A-\n    Sp = np.sqrt(((V-Ap)**2).sum(1))             # khoảng cách Euclide\n    Sn = np.sqrt(((V-An)**2).sum(1))\n    return Sn / (Sp + Sn)                         # hệ số gần gũi C*\n\ndef entropy_w(X):\n    Xp=X.copy(); Xp[:,~benefit]=1/Xp[:,~benefit]\n    P=Xp/Xp.sum(0); k=1/np.log(len(X))\n    E=-k*(P*np.log(P+1e-12)).sum(0)\n    return (1-E)/(1-E).sum()                       # trọng số khách quan\n\nw_expert=np.array([.10,.10,.15,.20,.15,.15,.05,.10])\nprint('Expert :', topsis(X, w_expert).round(3))    # ĐNB dẫn đầu\nprint('Entropy:', topsis(X, entropy_w(X)).round(3))# ĐBSH vượt lên #1", "bai7": "import numpy as np\nfrom pymoo.core.problem import ElementwiseProblem\nfrom pymoo.algorithms.moo.nsga2 import NSGA2\nfrom pymoo.optimize import minimize\n\nclass VietnamDigital(ElementwiseProblem):\n    def __init__(s):\n        super().__init__(n_var=24, n_obj=4, n_ieq_constr=14,\n                         xl=np.zeros(24), xu=np.full(24, 12000.))\n        s.beta=beta_matrix          # (6,4) như Bài 4\n        s.e  =np.array([.42,.55,.48,.32,.62,.38])   # cường độ phát thải\n        s.rho=np.array([.18,.45,.28,.12,.52,.22])   # rủi ro dữ liệu / AI\n        s.sig=np.array([.32,.28,.30,.35,.25,.30])   # giảm rủi ro / H\n    def _evaluate(s, x, out, *a, **k):\n        X=x.reshape(6,4); tot=X.sum(1)\n        f1=-(s.beta*X).sum()                         # max GDP gain\n        f2=np.abs(tot-tot.mean()).mean()             # min bất bình đẳng (MAD~Gini)\n        f3=(s.e*(X[:,0]+X[:,2])).sum()               # min phát thải\n        f4=(s.rho*X[:,2]).sum()-(s.sig*X[:,3]).sum() # min rủi ro ròng\n        g =[X.sum()-50000]+[5000-tot[i] for i in range(6)]\\\n            +[tot[i]-12000 for i in range(6)]+[12000-X[:,3].sum()]\n        out['F']=[f1,f2,f3,f4]; out['G']=g\n\nres = minimize(VietnamDigital(), NSGA2(pop_size=100),\n               ('n_gen',200), seed=42, verbose=False)\n# Chọn nghiệm thỏa hiệp bằng TOPSIS, trọng số (0.40,0.25,0.20,0.15)\nF=res.F.copy(); F[:,0]*=-1\n# ... áp TOPSIS trên F -> C*=0.847", "bai8": "import numpy as np\nfrom scipy.optimize import minimize\nT=10; dK,dD,dAI=0.05,0.12,0.15; thH,mu=0.8,0.02\nph=(0.003,0.002,0.004); rho=0.97; a,b,g,d,t=0.33,0.42,0.10,0.08,0.07\nK0,L0,D0,AI0,H0 = 27500.,53.9,20.3,86.,30.; A0=30.94   # nối từ Bài 1\n\ndef welfare(shares):           # shares: (T,4) tỉ lệ đầu tư IK,ID,IAI,IH trên Y\n    K,D,AI,H,A,W = K0,D0,AI0,H0,A0,0.0\n    for sK,sD,sA,sH in shares:\n        Y = A*K**a*L0**b*D**g*AI**d*H**t\n        C = max((1-(sK+sD+sA+sH))*Y, 1.0)\n        W += rho**0 * np.log(C)                      # U(C)=ln C, chiết khấu ρ\n        K=(1-dK)*K+sK*Y; D=(1-dD)*D+sD*Y*2.8e-3\n        AI=(1-dAI)*AI+sA*Y*1.8e-2; H=H+thH*sH*Y*7.7e-4-mu*H\n        A=A*(1+ph[0]*D/100+ph[1]*AI/100+ph[2]*H/100) # TFP nội sinh\n    return W\n\n# tối đa hóa phúc lợi với ràng buộc Σđầu tư<=42% và stock_cuối >= stock_đầu\nneg=lambda z: -welfare(z.reshape(T,4))\ncons=[{'type':'ineq','fun':lambda z,i=i:0.42-z.reshape(T,4)[i].sum()} for i in range(T)]\nr=minimize(neg, np.full(T*4,0.12), method='SLSQP',\n           bounds=[(0,0.38)]*40, constraints=cons)\nprint('Tỉ lệ đầu tư/GDP:', (r.x.reshape(T,4).sum(1)*100).round(1))\n# 39.3 -> 31.7  => FRONT-LOADED (đầu tư sớm để compound)", "bai9": "import cvxpy as cp, numpy as np   # (hoặc PuLP — bài toán tuyến tính)\nrisk=np.array([18,42,25,38,52,35,28,22])/100\na1=np.array([8.5,32.5,12.8,22.4,45.8,28.5,62.5,18.5])   # việc mới / tỷ AI\nb1=np.array([45,28,35,32,22,30,20,55.])                 # nâng cấp / tỷ H\nc1=np.array([5.2,62.4,18.5,48.2,72.5,42.8,32.5,12.5])   # dịch chuyển / tỷ AI\nd1=np.array([50,32,42,38,26,36,24,62.])                 # năng lực ĐT / tỷ H\n\nxA=cp.Variable(8, nonneg=True); xH=cp.Variable(8, nonneg=True)\nNet = cp.multiply(a1,xA) + cp.multiply(b1,xH) - cp.multiply(c1*risk, xA)\ncon=[cp.sum(xA+xH) <= 30000, Net >= 0,\n     cp.multiply(c1*risk,xA) <= cp.multiply(d1,xH)]   # Displaced <= RetrainCap\ncp.Problem(cp.Maximize(cp.sum(Net)), con).solve()\nprint('Tổng NetJob =', round(float(cp.sum(Net).value)))  # ~1.43 triệu việc", "bai10": "import pyomo.environ as pyo\nS=['s1','s2','s3','s4']; J=['I','D','AI','H']\np ={'s1':.30,'s2':.45,'s3':.20,'s4':.05}\nb0={'I':1.00,'D':1.10,'AI':1.25,'H':0.95}\nbs={('s1','I'):1.25,('s1','D'):1.35,('s1','AI'):1.55,('s1','H'):1.05,\n    ('s2','I'):1.00,('s2','D'):1.10,('s2','AI'):1.25,('s2','H'):0.95,\n    ('s3','I'):0.75,('s3','D'):0.85,('s3','AI'):0.90,('s3','H'):1.00,\n    ('s4','I'):0.40,('s4','D'):0.50,('s4','AI'):0.55,('s4','H'):1.10}\nm=pyo.ConcreteModel()\nm.x=pyo.Var(J, domain=pyo.NonNegativeReals)            # first-stage\nm.y=pyo.Var(S, J, domain=pyo.NonNegativeReals)         # recourse\nm.b1=pyo.Constraint(expr=sum(m.x[j] for j in J) <= 65000)\nm.b2=pyo.Constraint(S, rule=lambda m,s: sum(m.y[s,j] for j in J) <= 15000)\nm.link=pyo.Constraint(S, rule=lambda m,s: m.y[s,'AI'] <= 0.5*m.x['H'])\nm.obj=pyo.Objective(sense=pyo.maximize, rule=lambda m:\n    sum(b0[j]*m.x[j] for j in J) +\n    sum(p[s]*sum(bs[s,j]*m.y[s,j] for j in J) for s in S))\npyo.SolverFactory('glpk').solve(m)\n# VSS = Z_SP - Z_EEV ; EVPI = Z_WS - Z_SP  (đo giá trị của tư duy xác suất)", "bai11": "import numpy as np\nalloc={0:[.70,.10,.10,.10],1:[.40,.25,.15,.20],2:[.25,.45,.15,.15],\n       3:[.20,.20,.45,.15],4:[.30,.20,.10,.40]}     # 5 hành động ngân sách\nQ=np.zeros((3,3,3,3,5)); rng=np.random.default_rng(2026)\ngamma,alpha=0.95,0.1\n\nfor ep in range(15000):\n    # EXPLORING STARTS: reset ngẫu nhiên để cả 81 trạng thái cùng hội tụ\n    s=tuple(rng.integers(3,size=4))\n    for _ in range(10):\n        eps=max(0.05, 1-ep/7000)\n        a = int(rng.integers(5)) if rng.random()<eps else int(np.argmax(Q[s]))\n        s2, r = env_step(s, a)        # mô phỏng: AI hiệu quả CHỈ khi đã có nền D&H\n        Q[s+(a,)] += alpha*(r + gamma*Q[s2].max() - Q[s+(a,)])\n        s = s2\n\npolicy = lambda s: int(np.argmax(Q[s]))   # π*(s) = argmax_a Q(s,a)\n# π* đạt phúc lợi 6.85 — vượt mọi luật cố định (AI dẫn dắt 6.04, Cân bằng 2.64)"};

// ---- math model block: eqs[] (tex display), vars (html), constraints[] = [tex, name] ----
function model(label,eqs,vars,cons){
  let h='<div class="model"><div class="mlabel">'+label+'</div>';
  eqs.forEach(t=>{h+='<div class="eq" data-tex="'+t.replace(/"/g,'&quot;')+'"></div>';});
  if(vars)h+='<div class="vars">'+vars+'</div>';
  if(cons&&cons.length){h+='<ul class="constraints">'+cons.map(c=>`<li><span class="cx" data-tex="${c[0].replace(/"/g,'&quot;')}"></span><span class="cn">${c[1]||''}</span></li>`).join('')+'</ul>';}
  return h+'</div>';
}
// ---- python syntax highlighter (lightweight) ----
function pyHi(src){
  const esc=s=>s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  return src.split('\n').map(line=>{
    // comments
    let m=line.match(/^(.*?)(#.*)$/);
    let codePart=m?m[1]:line, com=m?m[2]:'';
    let h=esc(codePart);
    // strings
    h=h.replace(/('[^']*'|"[^"]*")/g,'<span class="st">$1</span>');
    // keywords
    h=h.replace(/\b(import|from|def|for|in|if|else|elif|return|lambda|while|class|and|or|not|None|True|False|as|print)\b/g,'<span class="kw">$1</span>');
    return h+(com?'<span class="cm">'+esc(com)+'</span>':'');
  }).join('\n');
}

  const src=CODE[id]||'';
  return `<div class="codewrap"><div class="codehead" onclick="this.parentNode.classList.toggle('open')">

    <span class="tog"><span class="chev">▸</span> xem mã</span></div>
    <div class="codebody"><pre>${pyHi(src)}</pre></div></div>`;
}

function initBai1(){
const b=R.bai1, years=[2020,2021,2022,2023,2024,2025];
const Y=[8044.4,8487.5,9513.3,10221.8,11511.9,12847.6];
mkChart('c1_tfp',{type:'line',data:{labels:years,datasets:[{label:'Aₜ',data:b.A,borderColor:COL.green,backgroundColor:'rgba(74,222,128,.12)',borderWidth:3,fill:true,tension:.3,pointRadius:5,pointBackgroundColor:'#fff',pointBorderColor:COL.green,pointBorderWidth:2}]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false}},scales:{y:{title:{display:true,text:'TFP (chỉ số)'}}}}});
mkChart('c1_fc',{data:{labels:years,datasets:[{type:'bar',label:'Thực tế',data:Y,backgroundColor:'rgba(96,165,250,.7)',borderRadius:5},{type:'line',label:'Dự báo Ŷ',data:b.Yhat,borderColor:COL.red,borderWidth:3,borderDash:[6,4],pointRadius:4,tension:.2,fill:false}]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{position:'top'}},scales:{y:{title:{display:true,text:'GDP (ngh.tỷ)'}}}}});
mkChart('c1_dec',{type:'bar',data:{labels:b.decomp.map(d=>d[0]),datasets:[{data:b.decomp.map(d=>d[1]),backgroundColor:[COL.green,COL.blue,COL.red,COL.gold,COL.teal,COL.purple],borderRadius:5}]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false}},scales:{y:{title:{display:true,text:'% tăng trưởng'}},x:{ticks:{maxRotation:35}}}}});
const A2025=b.A[5],K2025=25900,L2025=53.4,Y2025=12847.6;
const a=0.33,bb=0.42,g=0.10,d=0.08,th=0.07,D5=19.5,AI5=80.1,H5=29.2;
let scChart;
function gv(id){return document.getElementById(id).value;}
function calc(){
 const d_=+gv('s_d'),ai_=+gv('s_ai'),h_=+gv('s_h'),gk=+gv('s_gk')/100,ga=+gv('s_ga')/100,gl=0.006;
 document.getElementById('v_d').textContent=fmt(d_,1);document.getElementById('v_ai').textContent=fmt(ai_,0);
 document.getElementById('v_h').textContent=fmt(h_,1);document.getElementById('v_gk').textContent=fmt(gk*100,1);document.getElementById('v_ga').textContent=fmt(ga*100,1);
 const tr=[];for(let t=0;t<=5;t++){const Kt=K2025*Math.pow(1+gk,t),Lt=L2025*Math.pow(1+gl,t),At=A2025*Math.pow(1+ga,t);
  const Dt=D5+(d_-D5)*t/5,AIt=AI5+(ai_-AI5)*t/5,Ht=H5+(h_-H5)*t/5;
  tr.push(At*Math.pow(Kt,a)*Math.pow(Lt,bb)*Math.pow(Dt,g)*Math.pow(AIt,d)*Math.pow(Ht,th));}
 const y30=tr[5],cagr=(Math.pow(y30/Y2025,1/5)-1)*100,pc=y30*1e12/110e6/25500;
 document.getElementById('y2030').textContent=fmt(y30,0);
 document.getElementById('r_mult').textContent=fmt(y30/Y2025,2)+'×';
 document.getElementById('r_cagr').textContent=fmt(cagr,2)+'%/năm';
 document.getElementById('r_pc').textContent='~'+fmt(pc,0)+' USD';
 const labels=[...years,2026,2027,2028,2029,2030];
 const actual=[...Y,null,null,null,null,null];
 const proj=[null,null,null,null,null,Y2025,tr[1],tr[2],tr[3],tr[4],tr[5]];
 const data={labels,datasets:[{label:'Thực tế',data:actual,borderColor:COL.blue,backgroundColor:'rgba(96,165,250,.1)',borderWidth:3,pointRadius:4,tension:.25,fill:true},{label:'Dự báo→2030',data:proj,borderColor:COL.red,borderWidth:3,borderDash:[7,4],pointRadius:4,tension:.25}]};
 if(scChart){scChart.data=data;scChart.update();}else scChart=new Chart(document.getElementById('c1_sc'),{type:'line',data,options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{position:'top'}},scales:{y:{title:{display:true,text:'GDP (ngh.tỷ)'}}}}});
}
['s_d','s_ai','s_h','s_gk','s_ga'].forEach(id=>{const e=document.getElementById(id);if(e)e.addEventListener('input',calc);});
const rb=document.getElementById('s_reset');if(rb)rb.addEventListener('click',()=>{document.getElementById('s_d').value=30;document.getElementById('s_ai').value=100;document.getElementById('s_h').value=35;document.getElementById('s_gk').value=6;document.getElementById('s_ga').value=1.2;calc();});
calc();
}

${secH('💬',COL.soft,'Thảo luận','Câu 3.5')}
<div class="qa"><div class="q">a) 3 ngành ưu tiên?</div><div class="a">${b.ranking.slice(0,3).map(r=>r[0]).join(', ')} — phù hợp Nghị quyết 57 về đột phá KH-CN, đổi mới sáng tạo &amp; chuyển đổi số.</div></div>

// ============ BÀI 4 ============
function renderBai4(){const b=R.bai4;

return `<div class="crumb">Cấp độ Trung bình · Bài 4/12</div><h1>LP phân bổ ngân sách số 6 vùng × 4 hạng mục</h1>
<p class="sub">Tối đa hóa tăng GDP toàn quốc từ 50 nghìn tỷ, ràng buộc trần/sàn vùng và <b>công bằng số hóa</b> giữa các vùng.</p>
<div class="objective">🎯 <b>Mục tiêu:</b> Giải LP 24 biến bằng PuLP; phát hiện &amp; xử lý <b>tính bất khả thi</b> của ràng buộc công bằng; định lượng "chi phí của công bằng".</div>
${secH('Σ',COL.brand,'Mô hình toán học','24 biến (6 vùng × 4 hạng mục) · 5 nhóm ràng buộc')}

 ['\\max\\; Z = \\sum_{r=1}^{6}\\sum_{j=1}^{4} \\beta_{rj}\\, x_{rj}'],
 '<code>x_{rj}</code> vốn cho vùng r, hạng mục j (ngh.tỷ) · <code>β_{rj}</code> hệ số hiệu quả biên (ma trận 6×4, cao ở ĐNB/ĐBSH cho AI, ở vùng khó cho Hạ tầng &amp; Nhân lực) · <code>D⁰_r</code> mức số hóa nền vùng r · <code>γ</code> hệ số chuyển vốn→điểm số hóa.',
 [['\\sum_{r,j} x_{rj} \\le 50000','tổng ngân sách'],
  ['5000 \\le \\sum_j x_{rj} \\le 12000\\;\\forall r','sàn &amp; trần mỗi vùng'],
  ['\\sum_r x_{rH} \\ge 12000','tổng nhân lực toàn quốc'],
  ['D^0_r + \\gamma x_{rD} \\le M\\;\\forall r','M = mức số hóa cao nhất'],
  ['D^0_r + \\gamma x_{rD} \\ge \\lambda M\\;\\forall r','công bằng: vùng thấp ≥ λ·cao nhất']])}

${check('Với <b>λ=0,70</b> như đề bài, bài toán <b>VÔ NGHIỆM (Infeasible)</b>. Lý do: Tây Nguyên có D⁰=32 thấp nhất; dù dồn toàn bộ trần 12.000 vào số hóa cũng chỉ đạt D≈56, trong khi 0,70×82 (ĐNB) = 57,4 > 56. Ngưỡng λ khả thi tối đa là <b>λ_max ≈ '+fmt(b.lam_max,3)+'</b>. Đây là một phát hiện quan trọng: ràng buộc công bằng quá chặt sẽ phá vỡ tính khả thi.',true)}
<div class="note">Cách xử lý: hoặc (i) hạ λ xuống ≤ 0,68; hoặc (ii) nới trần vùng khó; hoặc (iii) tăng γ (hiệu suất vốn→số hóa) cho vùng yếu. Dưới đây dùng <b>λ=0,65</b> để minh họa nghiệm tối ưu khả thi.</div>

${secH('2',COL.green,'Nghiệm tối ưu (λ=0,65)','Câu 4.4.2')}
<div class="stats">${stat('Z* (công bằng)',fmt(b.Z_eq,0),'ngh.tỷ, λ=0,65',COL.green)}${stat('Z* (không CB)',fmt(b.Z_noeq,0),'không ràng buộc công bằng',COL.blue)}${stat('Chi phí công bằng',fmt(b.cost_equity,0),fmt(100*b.cost_equity/b.Z_noeq,1)+'% GDP mất đi',COL.red)}${stat('λ_max',fmt(b.lam_max,3),'ngưỡng khả thi',COL.gold)}</div>
<div class="tbl"><table><thead><tr><th>Vùng</th>${items.map(i=>`<th>${i}</th>`).join('')}<th>Tổng</th></tr></thead><tbody>${mrows}</tbody><tfoot><tr><td>Tổng cột</td>${b.col_totals.map(c=>`<td class="mono">${fmt(c,0)}</td>`).join('')}<td class="mono">50.000</td></tr></tfoot></table></div>
<div class="grid2"><div class="chart-card"><h4>Phân bổ theo vùng</h4><div class="cbox sm"><canvas id="c4_reg"></canvas></div></div>
<div class="chart-card"><h4>Phân bổ theo hạng mục</h4><div class="cbox sm"><canvas id="c4_item"></canvas></div></div></div>

<div class="note"><b>Chi phí của công bằng = ${fmt(b.cost_equity,0)} ngh.tỷ (${fmt(100*b.cost_equity/b.Z_noeq,1)}%)</b>: đây là phần GDP phải hy sinh để thu hẹp khoảng cách số hóa vùng miền. Khi λ↑ về phía λ_max, chi phí này tăng dần và vọt lên vô hạn (vô nghiệm) khi vượt ngưỡng — minh họa đánh đổi hiệu quả–công bằng kinh điển.</div>
${secH('💬',COL.soft,'Thảo luận','Câu 4.5')}
<div class="qa"><div class="q">a) Ràng buộc công bằng có nên giữ?</div><div class="a">Nên, nhưng phải <b>khả thi</b>: chọn λ≈0,60–0,65 thay vì 0,70. Công bằng vùng miền là mục tiêu của Chương trình MTQG phát triển KT-XH vùng đồng bào DTTS &amp; miền núi.</div></div>

function renderBai6(){const b=R.bai6;

const wrows=b.criteria.map((c,i)=>`<tr><td>${c}</td><td class="mono">${fmt(b.entropy_weights[i],3)}</td></tr>`).join('');
const srows=R.bai6_sens.map(([w,t3])=>`<tr><td class="mono">w=${fmt(w,2)}</td><td>${t3.join(' · ')}</td></tr>`).join('');
return `<div class="crumb">Cấp độ Trung bình · Bài 6/12</div><h1>TOPSIS xếp hạng 6 vùng kinh tế</h1>
<p class="sub">Ra quyết định đa tiêu chí (MCDM): xếp hạng mức độ sẵn sàng AI của 6 vùng theo 8 chỉ tiêu, so sánh trọng số chuyên gia vs entropy.</p>
<div class="objective">🎯 <b>Mục tiêu:</b> Cài đặt TOPSIS đầy đủ (chuẩn hóa vector, lý tưởng ±, hệ số gần gũi); tính trọng số khách quan bằng entropy; phân tích độ nhạy.</div>
${secH('Σ',COL.brand,'Mô hình toán học','TOPSIS · 6 phương án × 8 tiêu chí')}
${model('TOPSIS (Technique for Order Preference by Similarity to Ideal Solution)',
 ['r_{ij} = \\frac{x_{ij}}{\\sqrt{\\sum_i x_{ij}^2}},\\qquad v_{ij} = w_j\\, r_{ij}',
  'S_i^{+} = \\sqrt{\\sum_j (v_{ij}-v_j^{+})^2},\\quad S_i^{-} = \\sqrt{\\sum_j (v_{ij}-v_j^{-})^2},\\quad C_i^{*} = \\frac{S_i^{-}}{S_i^{+}+S_i^{-}}'],
 '<code>v⁺</code> giải pháp lý tưởng dương (tốt nhất mỗi tiêu chí) · <code>v⁻</code> lý tưởng âm · <code>C*</code> ∈ [0,1], càng gần 1 càng tốt. Gini là tiêu chí <b>chi phí</b> (đảo cực).',
 [['\\textstyle\\sum_j w_j = 1','trọng số chuẩn hóa'],
  ['w_j^{entropy} = \\frac{1-E_j}{\\sum(1-E_k)}','trọng số entropy khách quan']])}
${code('bai6','TOPSIS + trọng số entropy (chuẩn hóa vector, lý tưởng ±, C*)')}

${secH('1',COL.green,'Xếp hạng theo 2 bộ trọng số','Câu 6.4.1–6.4.2')}
<div class="stats">${stat('#1 (Chuyên gia)','ĐNB',fmt(Math.max(...b.expert),3),COL.green)}${stat('#1 (Entropy)','ĐBSH',fmt(Math.max(...b.entropy),3),COL.blue)}${stat('Khác biệt','Top-1 đổi','chuyên gia ≠ khách quan',COL.gold)}</div>
<div class="tbl"><table><thead><tr><th>Vùng</th><th>C* chuyên gia</th><th>Hạng</th><th>C* entropy</th><th>Hạng</th></tr></thead><tbody>${rows}</tbody></table></div>
<div class="chart-card"><h4>So sánh hệ số gần gũi C* hai phương pháp</h4><div class="cbox"><canvas id="c6_cmp"></canvas></div></div>
${check('Top-1 <b>đổi ngôi</b>: trọng số chuyên gia (nhấn AI &amp; FDI) ⇒ Đông Nam Bộ #1; entropy (khách quan, nhấn chỉ tiêu phân tán mạnh) ⇒ ĐB sông Hồng #1. Cho thấy kết quả MCDM <b>nhạy với cách chọn trọng số</b>.',true)}

${secH('2',COL.teal,'Trọng số entropy','Câu 6.4.2 · khách quan từ dữ liệu')}
<div class="grid2"><div class="tbl" style="align-self:start"><table><thead><tr><th>Tiêu chí</th><th>Trọng số entropy</th></tr></thead><tbody>${wrows}</tbody></table></div>
<div class="chart-card"><h4>Trọng số entropy theo tiêu chí</h4><div class="cbox sm"><canvas id="c6_w"></canvas></div></div></div>

${secH('3',COL.purple,'Độ nhạy trọng số AI','Câu 6.4.3')}
<div class="tbl"><table><thead><tr><th>Trọng số AI</th><th>Top-3 vùng</th></tr></thead><tbody>${srows}</tbody></table></div>
${secH('💬',COL.soft,'Thảo luận','Câu 6.5')}
<div class="qa"><div class="q">a) Nên dùng trọng số nào?</div><div class="a">Kết hợp: entropy bảo đảm khách quan từ dữ liệu; chuyên gia phản ánh ưu tiên chính sách. Có thể lấy trung bình hai bộ (trọng số "lai") để cân bằng.</div></div>
<div class="qa"><div class="q">b) ĐBSH vượt ĐNB nói lên điều gì?</div><div class="a">Theo dữ liệu khách quan, ĐBSH (Hà Nội + vùng phụ cận) đồng đều hơn ở nhiều chỉ tiêu; ĐNB mạnh FDI/AI nhưng bất bình đẳng (Gini) cao hơn ⇒ tụt khi entropy nhấn các chỉ tiêu phân tán.</div></div>`;}
function initBai6(){const b=R.bai6;const short=['TDMN','ĐBSH','BTB','TN','ĐNB','ĐBSCL'];
mkChart('c6_cmp',{type:'bar',data:{labels:short,datasets:[{label:'Chuyên gia',data:b.expert,backgroundColor:'rgba(74,222,128,.75)',borderRadius:4},{label:'Entropy',data:b.entropy,backgroundColor:'rgba(96,165,250,.75)',borderRadius:4}]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{position:'top'}},scales:{y:{title:{display:true,text:'C* (gần gũi)'},max:1}}}});
mkChart('c6_w',{type:'bar',data:{labels:b.criteria,datasets:[{data:b.entropy_weights,backgroundColor:COL.teal,borderRadius:4}]},options:{indexAxis:'y',responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false}},scales:{x:{title:{display:true,text:'trọng số'}}}}});}

function renderBai7(){const b=R.bai7,c=b.compromise,mg=b.maxgrowth,opp=R.bai7_opp;
return `<div class="crumb">Cấp độ Khá khó · Bài 7/12</div><h1>NSGA-II tối ưu đa mục tiêu phân bổ số</h1>
<p class="sub">Tìm mặt Pareto cân bằng 4 mục tiêu xung đột: tăng GDP, giảm bất bình đẳng vùng, giảm phát thải, giảm rủi ro AI/dữ liệu.</p>
<div class="objective">🎯 <b>Mục tiêu:</b> Chạy NSGA-II (pymoo) trên bài toán 24 biến/4 mục tiêu; trích mặt Pareto; vẽ scatter 3D &amp; trục song song; chọn nghiệm thỏa hiệp bằng TOPSIS; phân tích chi phí cơ hội.</div>
${secH('Σ',COL.brand,'Mô hình toán học','4 mục tiêu · 24 biến · 14 ràng buộc')}
${model('Tối ưu đa mục tiêu (MOO) — tìm tập Pareto',
 ['\\min\\; \\mathbf{F}(x) = \\big(-f_1(x),\\, f_2(x),\\, f_3(x),\\, f_4(x)\\big)'],
 '<code>f₁</code> tăng GDP (tối đa) · <code>f₂</code> bất bình đẳng vùng = độ lệch tuyệt đối TB (tối thiểu) · <code>f₃</code> phát thải CO₂ (tối thiểu) · <code>f₄</code> rủi ro ròng = rủi ro AI − giảm thiểu nhờ H (tối thiểu). Nghiệm x* <b>Pareto-tối ưu</b> nếu không thể cải thiện một mục tiêu mà không làm xấu mục tiêu khác.',
 [['f_1 = \\sum_{r,j}\\beta_{rj}x_{rj}','tăng GDP'],
  ['f_2 = \\tfrac{1}{6}\\sum_r |T_r - \\bar{T}|','bất bình đẳng (MAD≈Gini)'],
  ['f_3 = \\sum_r e_r (x_{rI}+x_{rAI})','phát thải'],
  ['f_4 = \\sum_r \\rho_r x_{rAI} - \\sigma_r x_{rH}','rủi ro ròng'],
  ['x \\in \\Omega','tập khả thi: ràng buộc C1–C6 như Bài 4']])}
${code('bai7','NSGA-II (pymoo, pop=100, gen=200, seed=42) + chọn thỏa hiệp TOPSIS')}

${secH('1',COL.green,'Cài đặt & mặt Pareto','Câu 7.4.1 · pymoo ElementwiseProblem, pop=100, gen=200')}
<div class="stats">${stat('|Pareto|',b.n_pareto,'nghiệm không trội',COL.green)}${stat('f₁ khoảng',fmt(b.f1_range[0]/1000,1)+'–'+fmt(b.f1_range[1]/1000,1)+'k','tăng GDP',COL.blue)}${stat('Thỏa hiệp C*',fmt(c.C,3),'TOPSIS chọn',COL.brand)}${stat('Max tăng trưởng','f₁='+fmt(mg.f1/1000,1)+'k','đánh đổi rủi ro cao',COL.gold)}</div>
${check('NSGA-II hội tụ về <b>'+b.n_pareto+' nghiệm không trội</b> sau 200 thế hệ — đây không phải một nghiệm tối ưu duy nhất mà là cả một <b>mặt đánh đổi</b> để nhà hoạch định lựa chọn.')}

${secH('2',COL.blue,'Scatter 3D & trục song song','Câu 7.4.2 · f₁,f₂,f₃ + parallel coordinates')}
<div class="grid2"><div class="chart-card"><h4>Pareto 3D: GDP (f₁) – Bất bình đẳng (f₂) – Phát thải (f₃)</h4><p class="cap">Trục X=f₁, Y=f₂; <b>kích thước &amp; màu điểm = f₃ phát thải</b> (nhỏ/xanh = thấp). ★ = nghiệm thỏa hiệp.</p><div class="cbox"><canvas id="c7_3d"></canvas></div></div>
<div class="chart-card"><h4>Pareto: GDP (f₁) vs Phát thải (f₃)</h4><p class="cap">Mặt chiếu phẳng bổ trợ cho góc nhìn 3D ở trên.</p><div class="cbox"><canvas id="c7_p13"></canvas></div></div></div>
<div class="chart-card"><h4>Biểu đồ trục song song (parallel coordinates) — 4 mục tiêu chuẩn hóa [0,1]</h4><p class="cap">Mỗi đường = 1 nghiệm Pareto; đường vàng đậm = nghiệm thỏa hiệp. Đường cắt chéo nhau ⇒ các mục tiêu xung đột.</p><div class="cbox"><canvas id="c7_par"></canvas></div></div>

${secH('3',COL.purple,'Nghiệm thỏa hiệp TOPSIS','Câu 7.4.3 · trọng số (0,40; 0,25; 0,20; 0,15)')}
<div class="tbl"><table><thead><tr><th>Mục tiêu</th><th>Thỏa hiệp (C*)</th><th>Max tăng trưởng</th></tr></thead><tbody>
<tr><td>f₁ Tăng GDP ↑</td><td class="mono win">${fmt(c.f1,0)}</td><td class="mono">${fmt(mg.f1,0)}</td></tr>
<tr><td>f₂ Bất bình đẳng ↓</td><td class="mono win">${fmt(c.f2,1)}</td><td class="mono bad">${fmt(mg.f2,1)}</td></tr>
<tr><td>f₃ Phát thải ↓</td><td class="mono win">${fmt(c.f3,0)}</td><td class="mono bad">${fmt(mg.f3,0)}</td></tr>
<tr><td>f₄ Rủi ro ròng ↓</td><td class="mono">${fmt(c.f4,0)}</td><td class="mono">${fmt(mg.f4,0)}</td></tr>
</tbody></table></div>
${check('Áp TOPSIS với trọng số ưu tiên chính sách (40% tăng trưởng, 25% bao trùm, 20% môi trường, 15% an ninh) ⇒ chọn 1 nghiệm thỏa hiệp duy nhất có C*='+fmt(c.C,3)+'.')}

${secH('4',COL.red,'Chi phí cơ hội của tăng trưởng','Câu 7.4.4 · nghiệm max-growth hi sinh bao nhiêu?')}
<div class="stats">${stat('+Tăng GDP',fmt(opp.growth_gain_pct,1)+'%','max-growth so với thỏa hiệp',COL.green)}${stat('−Bao trùm',fmt(opp.equity_worse_pct,0)+'%','bất bình đẳng xấu đi',COL.red)}${stat('−Môi trường',fmt(opp.emis_worse_pct,0)+'%','phát thải tăng',COL.gold)}</div>
${check('Để được thêm chỉ <b>~'+fmt(opp.growth_gain_pct,0)+'% GDP</b>, phương án "tăng trưởng tối đa" làm bất bình đẳng xấu đi <b>'+fmt(opp.equity_worse_pct,0)+'%</b> và phát thải tăng <b>'+fmt(opp.emis_worse_pct,0)+'%</b>. Chi phí cơ hội rất lớn ⇒ nghiệm thỏa hiệp hợp lý hơn nhiều về mặt chính sách.',true)}

${secH('💬',COL.soft,'Thảo luận chính sách','Câu 7.5')}
<div class="qa"><div class="q">a) Đánh đổi tăng trưởng – bao trùm có rõ ràng không?</div><div class="a">Rất rõ: trên mặt Pareto, để tăng f₁ phải hi sinh f₂ theo tỷ lệ phi tuyến (đường biên cong). Phản ánh cơ cấu kinh tế VN còn lệch về các cực tăng trưởng (ĐNB, ĐBSH) so với vùng khó (Tây Nguyên, miền núi).</div></div>
<div class="qa"><div class="q">b) Trọng số (0,40;0,25;0,20;0,15) có đúng ưu tiên VN (Đại hội XIII)?</div><div class="a">Khá phù hợp định hướng "tăng trưởng nhanh &amp; bền vững", nhưng để bám sát COP26 &amp; QĐ 127/QĐ-TTg nên nâng trọng số môi trường f₃ lên ~0,25–0,30 (giảm bớt f₁), đẩy nghiệm về phía xanh hơn.</div></div>
<div class="qa"><div class="q">c) Vai trò NSGA-II so với LP đơn mục tiêu? Có thay quyết định chính trị?</div><div class="a">NSGA-II phơi bày <b>toàn bộ</b> mặt đánh đổi thay vì 1 nghiệm; nó là <b>công cụ hỗ trợ</b>, không thay thế quyết định chính trị — việc chọn điểm nào trên mặt Pareto vẫn là lựa chọn giá trị, cần thảo luận thể chế.</div></div>`;}
function initBai7(){const b=R.bai7,pts=R.bai7_pts,c=b.compromise;
const f3=pts.map(p=>p[2]);
const f3min=Math.min(...f3),f3max=Math.max(...f3);
const heat=v=>{const t=(v-f3min)/(f3max-f3min+1e-9);const r=Math.round(96+t*(251-96)),g=Math.round(165-t*(165-113)),bl=Math.round(250-t*(250-133));return `rgba(${r},${g},${bl},.8)`;};
const rad=v=>4+12*(v-f3min)/(f3max-f3min+1e-9);   // bán kính bong bóng ~ f3
// "3D": bubble chart, X=f1, Y=f2, size&màu = f3 (chiều thứ ba)
mkChart('c7_3d',{type:'bubble',data:{datasets:[
 {label:'Pareto',data:pts.map(p=>({x:p[0],y:p[1],r:rad(p[2])})),backgroundColor:f3.map(heat),borderColor:'rgba(255,255,255,.2)',borderWidth:1},
 {label:'Thỏa hiệp ★',data:[{x:c.f1,y:c.f2,r:14}],backgroundColor:COL.gold,borderColor:'#fff',borderWidth:2}]},
 options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{position:'top'},tooltip:{callbacks:{label:ctx=>'f₁='+fmt(ctx.parsed.x,0)+' f₂='+fmt(ctx.parsed.y,0)}}},scales:{x:{title:{display:true,text:'f₁ Tăng GDP'}},y:{title:{display:true,text:'f₂ Bất bình đẳng'}}}}});
mkChart('c7_p13',{type:'scatter',data:{datasets:[{label:'Pareto',data:pts.map(p=>({x:p[0],y:p[2]})),backgroundColor:f3.map(heat),pointRadius:5},{label:'Thỏa hiệp ★',data:[{x:c.f1,y:c.f3}],backgroundColor:COL.gold,pointStyle:'star',pointRadius:16}]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{position:'top'}},scales:{x:{title:{display:true,text:'f₁ Tăng GDP'}},y:{title:{display:true,text:'f₃ Phát thải'}}}}});
const para=R.bai7_para;const labels=['f₁ GDP','f₂ Bất BĐ','f₃ Phát thải','f₄ Rủi ro'];
mkChart('c7_par',{type:'line',data:{labels,datasets:[{label:'Nghiệm thỏa hiệp',data:para.comp_para,borderColor:COL.gold,backgroundColor:'rgba(251,191,36,.15)',borderWidth:3,fill:true,pointRadius:5,tension:0},...para.parallel.slice(0,18).map(r=>({label:'',data:r,borderColor:'rgba(148,163,184,.18)',borderWidth:1,pointRadius:0,tension:0}))]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false}},scales:{y:{title:{display:true,text:'giá trị chuẩn hóa [0,1]'},min:0,max:1}}}});}

// ============ BÀI 8 ============
function renderBai8(){const b=R.bai8;
return `<div class="crumb">Cấp độ Khá khó · Bài 8/12</div><h1>Tối ưu động phân bổ đầu tư 10 năm</h1>
<p class="sub">Bài toán điều khiển tối ưu liên thời gian 2026–2035: chọn quỹ đạo đầu tư tối đa phúc lợi xã hội chiết khấu, với TFP nội sinh.</p>
<div class="objective">🎯 <b>Mục tiêu:</b> Giải DP/điều khiển tối ưu bằng scipy.SLSQP; xác định quỹ đạo đầu tư front-loaded hay back-loaded; phân tích vai trò hệ số chiết khấu ρ.</div>
${secH('Σ',COL.brand,'Mô hình toán học','10 giai đoạn · biến trạng thái K,D,AI,H · TFP nội sinh')}
${model('Điều khiển tối ưu / quy hoạch động (liên thời gian)',
 ['\\max_{\\{s_t\\}}\\; W = \\sum_{t=0}^{9} \\rho^{t}\\,\\ln C_t,\\qquad C_t = \\big(1-\\textstyle\\sum_k s_{kt}\\big)Y_t',
  'K_{t+1}=(1-\\delta_K)K_t + s_{Kt}Y_t,\\quad A_{t+1}=A_t\\big(1+\\phi_1\\tfrac{D_t}{100}+\\phi_2\\tfrac{AI_t}{100}+\\phi_3\\tfrac{H_t}{100}\\big)'],
 '<code>s_{kt}</code> tỷ lệ đầu tư cho yếu tố k tại năm t · <code>ρ=0,97</code> hệ số chiết khấu · phúc lợi U(C)=ln C. <b>TFP nội sinh</b>: số hóa, AI &amp; nhân lực làm A tăng theo thời gian (cơ chế tăng trưởng nội sinh).',
 [['\\textstyle\\sum_k s_{kt} \\le 0{,}42\\;\\forall t','trần đầu tư/GDP mỗi năm'],
  ['\\text{stock}_T \\ge \\text{stock}_0','ràng buộc bền vững (không vắt kiệt vốn)'],
  ['0 \\le s_{kt} \\le 0{,}38','biên từng khoản']])}

<div class="objective">🎯 <b>Mục tiêu:</b> Giải LP cân bằng tạo việc – mất việc do AI; ràng buộc năng lực đào tạo lại; tìm ngưỡng đầu tư AI an toàn.</div>

 ['\\max\\; \\text{Net} = \\sum_{i=1}^{8}\\big(a_i x^{AI}_i + b_i x^{H}_i - c_i\\,\\text{risk}_i\\, x^{AI}_i\\big)'],

 [['\\textstyle\\sum_i (x^{AI}_i + x^{H}_i) \\le 30000','tổng ngân sách'],
  ['\\text{Net}_i \\ge 0\\;\\forall i','không ngành nào mất việc ròng'],
  ['c_i\\,\\text{risk}_i\\,x^{AI}_i \\le d_i x^{H}_i','người bị thay thế ≤ năng lực đào tạo lại']])}

${secH('💬',COL.soft,'Thảo luận chính sách','Câu 9.5')}
<div class="qa"><div class="q">a) Ngành nào cần đào tạo lại nhiều nhất? Có khớp thực tế VN?</div><div class="a">Các ngành rủi ro cao &amp; đông lao động: <b>Bán buôn-bán lẻ, CN chế biến, Nông-Lâm</b>. Khớp thực tế — đây là các nhóm dễ bị tự động hóa (kho vận, dây chuyền, sơ chế) mà ILO Vietnam 2024 cảnh báo.</div></div>

function renderBai10(){const b=R.bai10,ex=R.bai10_extra;

<div class="objective">🎯 <b>Mục tiêu:</b> Giải SP 2-stage; tính giá trị của lời giải ngẫu nhiên (VSS) và giá trị thông tin hoàn hảo (EVPI).</div>
${secH('Σ',COL.brand,'Mô hình toán học','quyết định "ở đây – bây giờ" + điều chỉnh theo kịch bản')}
${model('Stochastic Programming 2 giai đoạn (recourse)',
 ['\\max\\; \\sum_j b^0_j x_j + \\mathbb{E}_{s}\\Big[\\sum_j b^s_j y_{sj}\\Big] = \\max\\; \\sum_j b^0_j x_j + \\sum_s p_s\\sum_j b^s_j y_{sj}'],
 '<code>x_j</code> quyết định giai đoạn 1 (trước khi biết kịch bản) · <code>y_{sj}</code> điều chỉnh giai đoạn 2 (sau khi kịch bản s xảy ra, xác suất <code>p_s</code>) · <code>b^s_j</code> hiệu quả theo kịch bản. 4 kịch bản: bùng nổ AI 30%, cơ sở 45%, trì trệ 20%, khủng hoảng 5%.',
 [['\\textstyle\\sum_j x_j \\le 65000','ngân sách giai đoạn 1'],
  ['\\textstyle\\sum_j y_{sj} \\le 15000\\;\\forall s','quỹ điều chỉnh mỗi kịch bản'],
  ['y_{s,AI} \\le 0{,}5\\,x_H','điều chỉnh AI bị giới hạn bởi nhân lực đã đầu tư']])}

<div class="tbl"><table><thead><tr><th>Kịch bản</th><th>Xác suất</th><th>GDP tăng</th></tr></thead><tbody>${drows}</tbody></table></div>
<div class="chart-card"><h4>Kết quả theo kịch bản (giai đoạn 2)</h4><div class="cbox"><canvas id="c10_sc"></canvas></div></div>

const years=[2026,2027,2028,2029,2030];
const a=0.33,bc=0.42,g=0.10,d=0.08,th=0.07;
const scen={'S1':[.70,.10,.10,.10],'S2':[.25,.45,.15,.15],'S3':[.20,.20,.45,.15],'S4':[.30,.20,.10,.40],'S5':[.25,.25,.30,.20]};

for(const[name,al]of Object.entries(scen)){
 let K=27500,D=20.3,AI=86,H=30,A=33.70,L0=53.9,budget=3000;
 const tr=[A*Math.pow(K,a)*Math.pow(L0,bc)*Math.pow(D,g)*Math.pow(AI,d)*Math.pow(H,th)];
 for(let t=0;t<4;t++){K=.95*K+al[0]*budget;D=.88*D+al[1]*budget*.01;AI=.85*AI+al[2]*budget*.05;H=H+.8*al[3]*budget*.01-.02*H;A=A*(1+.003*(D/100)+.002*(AI/100)+.004*(H/100));const L=L0*Math.pow(1.009,t+1);tr.push(A*Math.pow(K,a)*Math.pow(L,bc)*Math.pow(D,g)*Math.pow(AI,d)*Math.pow(H,th));}
 ds.push({label:name,data:tr,borderColor:cols[name],borderWidth:name=='S5'?3:2,tension:.3,pointRadius:3});

// ===== THEME =====
function applyChartTheme(){
  if(typeof Chart==='undefined')return;
  const dark=document.body.getAttribute('data-theme')!=='light';
  Chart.defaults.color=dark?'#94A3B8':'#475569';
  Chart.defaults.borderColor=dark?'rgba(45,212,191,.12)':'rgba(0,0,0,.07)';
}
function setTheme(t){
  if(t==='light') document.body.setAttribute('data-theme','light');
  else document.body.removeAttribute('data-theme');
  const btn=document.getElementById('themeBtn'); if(btn) btn.textContent = t==='light'?'☾':'☀';
  try{localStorage.setItem('aideom-term-theme',t);}catch(e){}
  applyChartTheme();
  rendered[currentPage]=false;
  show(currentPage);
}
document.getElementById('themeBtn').addEventListener('click',()=>{
  setTheme(document.body.getAttribute('data-theme')==='light'?'dark':'light');
});
(function initTheme(){
  let t='dark';
  try{t=localStorage.getItem('aideom-term-theme')||'dark';}catch(e){}
  if(t==='light'){document.body.setAttribute('data-theme','light');}else{document.body.removeAttribute('data-theme');}
  const b=document.getElementById('themeBtn');if(b)b.textContent=(t==='light'?'☾':'☀');
  applyChartTheme();
})();
window.addEventListener('error',function(e){
  if(typeof Chart==='undefined'){const w=document.getElementById('cdnWarn');if(w)w.style.display='block';}
});

});
